<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pm User Repository</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>pm User Repository</h1>
    <p>Community registry of user-contributed package definitions for
       <a href="https://github.com/hugoocoto/pm">pm</a>.</p>
  </header>

  <div class="layout">
    <div class="sidebar-region">
      <button class="toggle-btn" id="toggle-btn" aria-label="Toggle sidebar">☰</button>
      <aside id="sidebar">
        <input type="search" id="search" class="search" placeholder="Search packages..." aria-label="Search packages">
        <nav id="package-list" aria-label="Packages"></nav>
      </aside>
    </div>
    <main id="package-detail"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    var BASE = 'https://raw.githubusercontent.com/hugoocoto/pm-user-repository/refs/heads/main';
    var allPackages = [];
    var sidebarCollapsed = window.matchMedia('(max-width: 767px)').matches;

    function pkgId(pkg) { return pkg.user + '/' + pkg.dir; }

    async function init() {
      var res = await fetch(BASE + '/packages.json');
      allPackages = (await res.json()).packages;
      renderList(allPackages);

      var search = document.getElementById('search');
      var sidebar = document.getElementById('package-list');

      search.addEventListener('input', function () {
        var q = search.value.toLowerCase();
        var filtered = allPackages.filter(function (p) {
          return pkgId(p).toLowerCase().includes(q)
              || p.description.toLowerCase().includes(q);
        });
        renderList(filtered);
      });

      search.addEventListener('keydown', function (e) {
        var links = sidebar.querySelectorAll('a');
        if (links.length === 0) return;
        var idx = Array.prototype.indexOf.call(links, document.querySelector('#package-list a.active'));
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          var next = Math.min(idx + 1, links.length - 1);
          links[next].focus();
          links[next].click();
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          var prev = Math.max(idx - 1, 0);
          links[prev].focus();
          links[prev].click();
        }
      });

      var toggleBtn = document.getElementById('toggle-btn');
      var sidebarEl = document.getElementById('sidebar');
      if (sidebarCollapsed) sidebarEl.classList.add('collapsed');
      toggleBtn.textContent = sidebarCollapsed ? '\u25B6' : '\u2630';
      toggleBtn.addEventListener('click', function () {
        sidebarCollapsed = !sidebarCollapsed;
        sidebarEl.classList.toggle('collapsed');
        toggleBtn.textContent = sidebarCollapsed ? '\u25B6' : '\u2630';
      });

      window.addEventListener('hashchange', loadFromHash);
      loadFromHash();
      if (!window.location.hash && allPackages.length) loadPackage(allPackages[0]);
    }

    function renderList(packages) {
      var nav = document.getElementById('package-list');
      nav.innerHTML = '<h2>Packages <span class="count">(' + packages.length + ')</span></h2>';
      var list = document.createElement('ul');
      if (packages.length === 0) {
        var empty = document.createElement('li');
        empty.className = 'empty';
        empty.textContent = 'No packages found';
        list.appendChild(empty);
      } else {
        for (var i = 0; i < packages.length; i++) {
          var pkg = packages[i];
          var li = document.createElement('li');
          var a = document.createElement('a');
          a.href = '#' + pkgId(pkg);
          a.textContent = pkgId(pkg);
          li.appendChild(a);
          list.appendChild(li);
        }
      }
      nav.appendChild(list);

      markActive();

      nav.querySelectorAll('a').forEach(function (a) {
        a.addEventListener('click', function () { markActive(); });
      });
    }

    function markActive() {
      var hash = window.location.hash.slice(1);
      document.querySelectorAll('#package-list a').forEach(function (a) {
        a.classList.toggle('active', a.getAttribute('href') === '#' + hash);
      });
    }

    async function loadPackage(pkg) {
      var detail = document.getElementById('package-detail');
      detail.innerHTML = '<p>Loading\u2026</p>';

      var html = '<h2>' + pkgId(pkg) + '</h2>';

      try {
        var res = await fetch(BASE + '/' + pkg.user + '/' + pkg.dir + '/README.md');
        if (res.ok) {
          var md = await res.text();
          html += '<div class="readme">' + marked.parse(md) + '</div>';
        } else {
          html += '<dl>' +
            '<dt>File</dt><dd><code>' + pkg.dir + '/' + pkg.file + '</code></dd>' +
            '<dt>Description</dt><dd>' + pkg.description + '</dd>' +
            '</dl>';
        }
      } catch (e) {
        html += '<dl>' +
          '<dt>File</dt><dd><code>' + pkg.dir + '/' + pkg.file + '</code></dd>' +
          '<dt>Description</dt><dd>' + pkg.description + '</dd>' +
          '</dl>';
      }

      detail.innerHTML = html;
    }

    function loadFromHash() {
      var hash = window.location.hash.slice(1);
      if (!hash) return;
      var pkg = allPackages.find(function(p) { return pkgId(p) === hash; });
      if (pkg) loadPackage(pkg);
      markActive();
    }

    init();
  </script>
</body>
</html>
