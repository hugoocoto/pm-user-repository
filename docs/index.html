<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>pm User Repository</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header class="top-header">
      <a href="#" class="top-logo">pm User Repository</a>
      <span class="top-breadcrumb" id="top-breadcrumb"></span>
      <div class="top-end">
        <a href="https://github.com/hugoocoto/pm-user-repository" class="top-gh-link" target="_blank" rel="noopener" aria-label="GitHub">
          <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        </a>
        <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
          <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-1 0v-1A.5.5 0 0 1 8 1zm0 10a3 3 0 1 0 0-6 3 3 0 0 0 0 6zm6.5-2.5a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1h1zM8 13a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-1 0v-1A.5.5 0 0 1 8 13zm-5.5-4.5a.5.5 0 0 0 0-1h-1a.5.5 0 0 0 0 1h1zm.354-5.354a.5.5 0 0 1 .708 0l.707.707a.5.5 0 1 1-.708.708l-.707-.707a.5.5 0 0 1 0-.708zm8.496 8.496a.5.5 0 0 1 0 .708l-.707.707a.5.5 0 1 1-.708-.708l.707-.707a.5.5 0 0 1 .708 0zm.708-8.496a.5.5 0 0 1 0 .708l-.707.707a.5.5 0 1 1-.708-.708l.707-.707a.5.5 0 0 1 .708 0zM3.757 12.243a.5.5 0 0 1 0 .708l-.707.707a.5.5 0 1 1-.708-.708l.707-.707a.5.5 0 0 1 .708 0z"/></svg>
          <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M6 .278a.77.77 0 0 1 .08.858 7.2 7.2 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277q.792-.001 1.533-.16a.79.79 0 0 1 .81.316.73.73 0 0 1-.031.893A8.35 8.35 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.75.75 0 0 1 6 .278z"/></svg>
        </button>
      </div>
    </header>

    <main class="content" id="content"></main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    var BASE = 'https://raw.githubusercontent.com/hugoocoto/pm-user-repository/refs/heads/main';
    var allPackages = [];

    function pkgId(pkg) { return pkg.user + '/' + pkg.dir; }

    async function init() {
      var res = await fetch(BASE + '/packages.json');
      allPackages = (await res.json()).packages;

      if (localStorage.getItem('theme') === 'dark') {
        document.documentElement.setAttribute('data-theme', 'dark');
      }

      document.getElementById('theme-toggle').addEventListener('click', function () {
        var html = document.documentElement;
        var theme = html.getAttribute('data-theme') === 'dark' ? '' : 'dark';
        html.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
      });

      window.addEventListener('hashchange', navigate);
      navigate();
    }

    function navigate() {
      var hash = window.location.hash.slice(1);
      var bc = document.getElementById('top-breadcrumb');
      if (!hash) { bc.textContent = ''; renderHome(); return; }
      if (hash === 'search') { bc.textContent = 'Search'; renderSearch(); return; }
      var pkg = allPackages.find(function (p) { return pkgId(p) === hash; });
      if (pkg) { bc.textContent = hash; renderPackage(pkg); return; }
      bc.textContent = '';
      renderHome();
    }

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function renderHome() {
      var content = document.getElementById('content');
      var html =
        '<div class="home-page">' +
          '<div class="home-hero">' +
            '<h1>pm User Repository</h1>' +
            '<p>Community registry of package definitions for <a href="https://github.com/hugoocoto/pm" target="_blank" rel="noopener">pm</a>.</p>' +
            '<a href="#search" class="home-cta">Browse ' + allPackages.length + ' packages</a>' +
          '</div>' +

          '<div class="home-section">' +
            '<h2 class="home-section-title">What is pm?</h2>' +
            '<p>pm is a minimal package manager for Linux. You write Lua configuration files describing how to download, build, and install software. pm handles the fetch, build, and install cycle, symlinks binaries into your PATH, and can update them when new versions are released.</p>' +
            '<p><a href="https://github.com/hugoocoto/pm" class="home-link" target="_blank" rel="noopener">pm on GitHub ></a></p>' +
          '</div>' +

          '<div class="home-section">' +
            '<h2 class="home-section-title">Package Repository</h2>' +
            '<p>This repository hosts Lua package definitions consumed by pm. Each <code>.lua</code> file returns a table describing a package: its source URL, build steps, and artifact name. The <code>ur</code> module downloads these definitions over HTTPS, loads them in text-only mode (blocking bytecode injection), and executes them safely.</p>' +
          '</div>' +

          '<div class="home-section">' +
            '<h2 class="home-section-title">How to use</h2>' +
            '<p>Download the <code>ur.lua</code> module into your pm config directory:</p>' +
            '<div class="home-code"><pre>mkdir -p ~/.config/pm && curl -o ~/.config/pm/ur.lua https://raw.githubusercontent.com/hugoocoto/pm-user-repository/refs/heads/main/ur.lua</pre></div>' +
            '<p>Include it in your pm config (<code>init.lua</code>):</p>' +
            '<div class="home-code"><pre>local ur = require("ur")\n\nPackages = {\n    ur.Fetch { user = "hugoocoto", file = "nvim-nightly/nvim.lua" },\n    ur.Fetch { user = "hugoocoto", file = "helium/helium.lua" },\n}</pre></div>' +
          '</div>' +

          '<div class="home-section">' +
            '<h2 class="home-section-title">Package format</h2>' +
            '<p>Each <code>.lua</code> file must return a table with:</p>' +
            '<table class="home-pkg-table">' +
              '<thead><tr><th>Field</th><th>Required</th><th>Description</th></tr></thead>' +
              '<tbody>' +
                '<tr><td><code>url</code></td><td>Yes</td><td>Download URL for source archive or binary</td></tr>' +
                '<tr><td><code>build</code></td><td>Yes</td><td>Shell commands to produce the executable</td></tr>' +
                '<tr><td><code>name</code></td><td>No</td><td>Filename to save the download as (inferred from URL if absent)</td></tr>' +
                '<tr><td><code>artifact</code></td><td>Yes*</td><td>Executable name from build (falls back to <code>name</code>)</td></tr>' +
                '<tr><td><code>last_modified_cmd</code></td><td>No</td><td>Command to check remote Last-Modified date</td></tr>' +
              '</tbody>' +
            '</table>' +
          '</div>' +

          '<div class="home-section">' +
            '<h2 class="home-section-title">Contribute</h2>' +
            '<p>Packages are organized by GitHub username. To add your own:</p>' +
            '<ol>' +
              '<li>Fork this repository.</li>' +
              '<li>Create a directory named after your GitHub username.</li>' +
              '<li>Add your <code>.lua</code> file(s) and optionally a <code>README.md</code>.</li>' +
              '<li>Update <code>packages.json</code> with your entry.</li>' +
              '<li>Open a pull request. CI validates Lua syntax and root structure.</li>' +
            '</ol>' +
            '<p><a href="https://github.com/hugoocoto/pm-user-repository" class="home-link" target="_blank" rel="noopener">pm-user-repository on GitHub ></a></p>' +
          '</div>' +
        '</div>';
      content.innerHTML = html;
    }

    function renderSearch() {
      var content = document.getElementById('content');
      content.innerHTML =
        '<div class="search-page">' +
          '<div class="search-bar">' +
            '<input type="search" id="search-input" class="search-input" placeholder="Search packages..." autofocus>' +
          '</div>' +
          '<div class="search-results" id="search-results"></div>' +
        '</div>';

      var input = document.getElementById('search-input');
      var results = document.getElementById('search-results');

      function run() {
        var q = input.value.toLowerCase();
        var filtered = q ? allPackages.filter(function (p) {
          return pkgId(p).toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
        }) : allPackages;
        if (filtered.length === 0) {
          results.innerHTML = '<div class="search-empty">No packages found</div>';
          return;
        }
        var html = '';
        for (var i = 0; i < filtered.length; i++) {
          var p = filtered[i];
          html += '<a href="#' + pkgId(p) + '" class="search-item">' +
            '<span class="search-item-name">' + escapeHtml(pkgId(p)) + '</span>' +
            '<span class="search-item-desc">' + escapeHtml(p.description) + '</span>' +
            '</a>';
        }
        results.innerHTML = html;
      }

      input.addEventListener('input', run);
      run();
    }

    function installCmd(pkg) {
      return "ur.Fetch { user = \"" + pkg.user + "\", file = \"" + pkg.dir + "/" + pkg.file + "\" }";
    }

    async function renderPackage(pkg) {
      var content = document.getElementById('content');
      content.innerHTML = '<div class="loading"><p>Loading...</p></div>';

      var readmeHtml = '';
      try {
        var res = await fetch(BASE + '/' + pkg.user + '/' + pkg.dir + '/README.md');
        if (res.ok) {
          var md = await res.text();
          readmeHtml = marked.parse(md);
        }
      } catch (e) {}

      var fetchCmd = installCmd(pkg);
      var html =
        '<div class="pkg-detail">' +
          '<div class="pkg-header">' +
            '<h1 class="pkg-title">' + escapeHtml(pkgId(pkg)) + '</h1>' +
            '<p class="pkg-desc">' + escapeHtml(pkg.description) + '</p>' +
            '<div class="pkg-install">' +
              '<span class="install-code">' + escapeHtml(fetchCmd) + '</span>' +
              '<button class="copy-btn" data-cmd="' + escapeHtml(fetchCmd) + '">Copy</button>' +
            '</div>' +
          '</div>' +
          '<div class="pkg-body">' +
            '<div class="pkg-body-main">' +
              (readmeHtml ? '<div class="readme md-content">' + readmeHtml + '</div>' :
                '<div class="readme readme-empty"><p>No README available.</p></div>') +
            '</div>' +
            '<aside class="pkg-meta">' +
              '<div class="meta-card">' +
                '<div class="meta-section">' +
                  '<h3 class="meta-title">About</h3>' +
                  '<dl class="meta-list">' +
                    '<dt>Author</dt><dd>' + escapeHtml(pkg.user) + '</dd>' +
                    '<dt>File</dt><dd>' + escapeHtml(pkg.dir + '/' + pkg.file) + '</dd>' +
                    '<dt>Description</dt><dd>' + escapeHtml(pkg.description) + '</dd>' +
                  '</dl>' +
                '</div>' +
                '<div class="meta-section">' +
                  '<h3 class="meta-title">Install</h3>' +
                  '<div class="meta-install">' +
                    '<code>' + escapeHtml(fetchCmd) + '</code>' +
                    '<button class="meta-copy-btn" data-cmd="' + escapeHtml(fetchCmd) + '">Copy</button>' +
                  '</div>' +
                '</div>' +
                '<div class="meta-section meta-section-last">' +
                  '<h3 class="meta-title">Links</h3>' +
                  '<a href="https://github.com/' + escapeHtml(pkg.user) + '/' + escapeHtml(pkg.dir) + '" class="meta-link" target="_blank" rel="noopener">GitHub</a>' +
                '</div>' +
              '</div>' +
            '</aside>' +
          '</div>' +
        '</div>';

      content.innerHTML = html;

      content.querySelectorAll('.copy-btn, .meta-copy-btn').forEach(function (btn) {
        btn.addEventListener('click', function () {
          navigator.clipboard.writeText(this.dataset.cmd).then(function () {
            this.textContent = 'Copied!';
            setTimeout(function () { this.textContent = 'Copy'; }.bind(this), 2000);
          }.bind(this));
        });
      });
    }

    init();
  </script>
</body>
</html>
